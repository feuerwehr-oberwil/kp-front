# Pre-commit hooks. Install once with: pre-commit install
# Runs fast, local-only checks before each commit (mirrors a subset of CI).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # Backend lint + format (ruff). Scoped to the backend/ tree.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        name: ruff (backend)
        args: [--fix]
        files: ^backend/app/
      - id: ruff-format
        name: ruff-format (backend)
        files: ^backend/app/

  # Frontend lint (eslint on staged files only — fast; tsc/vitest stay in CI).
  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        entry: pnpm exec eslint
        language: system
        files: ^src/.*\.(ts|tsx)$
        pass_filenames: true
